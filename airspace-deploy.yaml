apiVersion: v1
kind: Namespace
metadata:
  name: zma-web-stack
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airspace
  namespace: zma-web-stack
  labels:
    app: airspace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: airspace
  template:
    metadata:
      labels:
        app: airspace
    spec:
      containers:
        - name: airspace
          image: ghcr.io/vzma/zma-center-tracon-visualizer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
