name: Build and Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase owner)
        id: meta
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/zma-center-tracon-visualizer" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          build-args: |
            VITE_MAPBOX_KEY=${{ secrets.VITE_MAPBOX_KEY }}
          tags: |
            ${{ steps.meta.outputs.IMAGE }}:${{ github.sha }}
            ${{ steps.meta.outputs.IMAGE }}:latest

  deploy-docker-image:
    needs: build-docker-image
    runs-on: ubuntu-latest
    steps:
      - name: Initialize doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log into K8s cluster
        run: doctl kubernetes cluster kubeconfig save --expiry-seconds 600 k8s-zma-website

      - name: Compute image name (lowercase owner)
        id: meta
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/zma-center-tracon-visualizer" >> $GITHUB_OUTPUT

      - name: Deploy image to cluster
        run: kubectl set image deployment/airspace airspace=${{ steps.meta.outputs.IMAGE }}:${{ github.sha }} -n zma-web-stack

      - name: Verify deployment
        run: kubectl rollout status deployment/airspace -n zma-web-stack
